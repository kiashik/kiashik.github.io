  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/ashik_islam_headshot.jpg"
    content: |-
      I graduated from Cal Poly San Luis Obispo with a B.S. in Electrical Engineering and a minor in Computer Science in June 2026. 
      I am interested in robotics, control systems, autonomous systems, and embedded development, and have practical engineering projects that connect hardware with software. 
      
      I enjoy building projects that combine theory with implementation, from modeling and controlling power electronics to developing robotics software in ROS 2 and simulation environments like CARLA. I am especially interested in systems where sensing, control, and software have to work together reliably.

      This portfolio highlights selected academic and personal projects involving robotics, simulation, computer vision, controls, and embedded engineering.
    skills:
      enable: true
      title: "Key tools I have worked with:"
      items:
        - "ROS2"
        - "Python"
        - "Computer Vision"
        - "MATLAB (Simulink)"
        - "Git"
        - "Intel RealSense SDK"
        - "Linux (Ubuntu)"
        - "CARLA Simulator"

