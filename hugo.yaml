  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: Autonomous Catch with a Robotic Arm
        content: "A real-time robotic interception system using YOLO, RealSense depth sensing, projectile prediction, OMPL, MoveIt Servo, and an OpenMANIPULATOR-Y robotic arm."
        image: "/images/OMY/ball_interception_demo_with_trajectory_OMY.gif" # TODO: use  gif instead
        featured:
          name: Read More
          # link: "/projects/my-first-post/"
          link: "/projects-pages/robotic-ball-catch/"
        badges:
          - "ROS2"
          - "Python"
          - "Computer Vision"
          - "YOLO"
          - "MoveIt"
        links:
          - icon: fab fa-github
            url: https://github.com/kiashik/throw_and_catch

      - title: CARLA Autonomous Parking
        content: "A simulation-based autonomous parking system using CARLA, ROS 2, Nav2, LiDAR-based parking spot classification, Hybrid-A* planning, and Regulated Pure Pursuit control."
        image: "/images/carla_parking/carla_spot_classification.png"
        featured:
          name: Read More
          link: "/projects-pages/carla-autonomous-parking/"
        badges:
          - "CARLA"
          - "ROS2"
          - "Nav2"
          - "Autonomous Driving"
          - "Python"
        links:
          - icon: fab fa-github
            url: https://github.com/kiashik/carla_autonomous_parking

      - title: "Vision-Based Robotic Object Sorting"
        content: "A vision-guided robotic sorting system using a 4-DOF arm, Intel RealSense D435, and OpenCV to detect, localize, and sort colored spherical objects in real-time."
        image: "/images/pick-n-place/pick_n_place_gif.gif"
        featured:
          name: Read More
          link: "/projects-pages/pick-n-place/"
        badges:
          - "Python"
          - "OpenCV"
          - "Robot Kinematics"
        links:
          - icon: fab fa-github
            url: https://github.com/gurusabarish/HugoProfileV2

